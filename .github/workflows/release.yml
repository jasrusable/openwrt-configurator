name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - run: npm run package

      - name: Generate checksums
        working-directory: artifacts
        run: |
          for f in openwrt-configurator-*; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/openwrt-configurator-linux
            artifacts/openwrt-configurator-linux.sha256
            artifacts/openwrt-configurator-macos
            artifacts/openwrt-configurator-macos.sha256
            artifacts/openwrt-configurator-win.exe
            artifacts/openwrt-configurator-win.exe.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
